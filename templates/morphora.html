<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Morphora - Chat-driven UI Morphing</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
  <style>
    body { margin: 0; overflow: hidden; height: 100vh; }
    .morphora-layout {
      display: flex;
      height: 100vh;
    }
    /* Canvas area */
    #canvas-wrap {
      flex: 1;
      overflow-y: auto;
      padding: 2rem;
    }
    #canvas {
      min-height: 200px;
    }
    /* Chat sidebar */
    #chat {
      width: 360px;
      min-width: 360px;
      border-left: 1px solid var(--pico-muted-border-color);
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
    #chat-header {
      padding: 1rem 1.2rem;
      border-bottom: 1px solid var(--pico-muted-border-color);
      font-weight: 600;
      font-size: 0.95rem;
    }
    #chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 1rem 1.2rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
    }
    .msg {
      padding: 0.6rem 0.9rem;
      border-radius: 0.75rem;
      font-size: 0.88rem;
      line-height: 1.45;
      max-width: 95%;
      word-wrap: break-word;
    }
    .msg-user {
      background: var(--pico-primary-background);
      color: var(--pico-primary-inverse);
      align-self: flex-end;
      border-bottom-right-radius: 0.2rem;
    }
    .msg-ai {
      background: var(--pico-muted-border-color);
      align-self: flex-start;
      border-bottom-left-radius: 0.2rem;
    }
    .msg-system {
      font-size: 0.8rem;
      color: var(--pico-muted-color);
      text-align: center;
      align-self: center;
    }
    #chat-input-area {
      padding: 0.8rem 1.2rem;
      border-top: 1px solid var(--pico-muted-border-color);
    }
    #chat-input-area form {
      display: flex;
      gap: 0.5rem;
      margin: 0;
    }
    #chat-input-area input {
      margin: 0;
      font-size: 0.88rem;
    }
    #chat-input-area button {
      margin: 0;
      white-space: nowrap;
      padding: 0.5rem 1rem;
      font-size: 0.88rem;
    }
    /* Welcome state */
    .welcome {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 60vh;
      text-align: center;
      color: var(--pico-muted-color);
    }
    .welcome h2 { margin-bottom: 0.5rem; color: var(--pico-color); }
    .welcome p { max-width: 500px; }
    /* Thinking indicator */
    .thinking-dots::after {
      content: '';
      animation: dots 1.5s steps(4, end) infinite;
    }
    @keyframes dots {
      0% { content: ''; }
      25% { content: '.'; }
      50% { content: '..'; }
      75% { content: '...'; }
    }
  </style>
</head>
<body>
  <div class="morphora-layout"
       data-signals='{"prompt": "", "thinking": false}'>

    <!-- Canvas: AI-generated UI goes here -->
    <div id="canvas-wrap">
      <a href="/" style="position:fixed;top:0.8rem;left:1rem;color:var(--pico-muted-color);text-decoration:none;font-size:0.85rem;z-index:10;">&larr; Back to demos</a>
      <div id="canvas">
        <div class="welcome">
          <h2>Morphora</h2>
          <p>Describe a UI and watch it appear. Try: "Create a calculator" or "Build a color palette picker"</p>
        </div>
      </div>
    </div>

    <!-- Chat sidebar -->
    <aside id="chat">
      <div id="chat-header">Chat</div>
      <div id="chat-messages">
        <div class="msg msg-system">Describe a UI to generate it on the canvas.</div>
      </div>
      <div id="chat-input-area">
        <form data-on:submit__prevent="@post('/morph')">
          <input type="text"
                 data-bind="$prompt"
                 placeholder="Describe a UI..."
                 data-attr:disabled="$thinking"
                 autocomplete="off" />
          <button type="submit" data-attr:disabled="$thinking">
            <span data-show="!$thinking">Send</span>
            <span data-show="$thinking" class="thinking-dots">Wait</span>
          </button>
        </form>
      </div>
    </aside>
  </div>

  <script type="module" src="https://cdn.jsdelivr.net/gh/starfederation/datastar@1.0.0-RC.8/bundles/datastar.js"></script>
</body>
</html>
